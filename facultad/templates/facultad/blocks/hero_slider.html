{% load wagtailcore_tags wagtailimages_tags %}

<div id="carouselFolp" class="carousel slide carousel-fade shadow" data-bs-ride="carousel" data-bs-pause="hover">
    <div class="carousel-inner">
        {% for slide in self %}
        <div class="carousel-item {% if forloop.first %}active{% endif %}" data-bs-interval="3000">
            {% image slide.imagen fill-1600x600 as img %}
            <div class="hero-banner"
                style="background-image: url('{{ img.url }}'); height: 500px; background-size: cover; background-position: center; position: relative;">

                <div
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2);">
                </div>

                <div class="container h-100 d-flex align-items-center" style="position: relative; z-index: 2;">
                    <div class="row w-100">
                        <div class="col-md-7 col-lg-5">
                            <div class="p-4 p-md-5 shadow-lg border-start border-5 hero-glass-card"
                                style="border-color: #005941 !important;">

                                <h2 class="display-6 fw-bold text-dark mb-3">{{ slide.titulo }}</h2>

                                {% if slide.subtitulo %}
                                <p class="lead text-secondary mb-4">{{ slide.subtitulo }}</p>
                                {% endif %}

                                {% if slide.link %}
                                <a href="{% pageurl slide.link %}"
                                    class="btn btn-success fw-bold text-uppercase px-4 py-2"
                                    style="background-color: #005941; border: none;">
                                    Leer más
                                </a>
                                {% endif %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselFolp" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselFolp" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
    </button>
</div>
