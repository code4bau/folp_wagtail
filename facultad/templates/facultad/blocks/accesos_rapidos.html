{% load wagtailimages_tags %}
<div class="logo-strip-container">
    <div class="logo-horizontal-row">
        {% for item in self %}
        <div class="logo-item">
            <a href="{{ item.url }}" class="text-decoration-none">
                <div class="logo-box-transparent">
                    {% image item.imagen_logo max-80x80 as logo_img %}
                    <img src="{{ logo_img.url }}" alt="{{ item.etiqueta }}">
                </div>
                <span class="logo-label">{{ item.etiqueta }}</span>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    /* El contenedor padre fuerza la fila */
    .logo-horizontal-row {
        display: flex;             /* Forza la línea horizontal */
        flex-wrap: nowrap;         /* Evita que se bajen si no entran */
        justify-content: center;   /* Los centra en la pantalla */
        align-items: flex-start;
        gap: 30px;                 /* Espacio entre logos */
        padding: 20px;
        overflow-x: auto;          /* Si son muchos, permite scroll lateral en celu */
    }

    .logo-item {
        flex: 0 0 auto;            /* No permite que se achiquen */
        width: 100px;
        text-align: center;
    }

    .logo-box-transparent {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        width: 50px;
        height: 50px;
        margin: 0 auto 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease;
    }

    .logo-box-transparent img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        /* La sombra sutil que sigue la forma del logo */
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); 
    }

    /* Animación al pasar el mouse */
    .logo-item:hover {
        transform: translateY(-5px);
    }
    
    .logo-item:hover img {
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
    }

    .logo-label {
        display: block;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.65rem;
        font-weight: 700;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>
